services:
  semaphore_db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: semaphore
    networks:
      - semaphore_network
    volumes:
      - ./pgdata:/var/lib/postgresql 

  semaphore:
    image: public.ecr.aws/semaphore/pro/server:v2.17.12
    depends_on:
      - semaphore_db
    ports:
      - 3000:3000
    environment:
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB_HOST: semaphore_db
      SEMAPHORE_DB_NAME: semaphore
      SEMAPHORE_DB_USER: postgres
      SEMAPHORE_DB_PASS: postgres
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: 123
      SEMAPHORE_ADMIN_NAME: Admin
      SEMAPHORE_ADMIN_EMAIL: admin@localhost
    networks:
      - semaphore_network
    volumes:
      - /root/.ssh:/home/semaphore/.ssh:ro
      - ./playbooks:/home/semaphore/playbooks

networks:
  semaphore_network:
    driver: bridge